[project]
name = "hydra-research-assistant"
version = "0.1.0"
description = "Hydra Phase 1 local research companion"
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.115.0,<1",
  "httpx>=0.27.0,<1",
  "pydantic>=2.8.0,<3",
  "pypdf>=5.0.0,<7",
  "python-multipart>=0.0.9,<1",
  "uvicorn[standard]>=0.30.0,<1",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3.0,<9",
]

[tool.pytest.ini_options]
testpaths = ["backend/tests"]
pythonpath = ["backend"]
