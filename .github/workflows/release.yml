name: Release

# Publishes HydraLab to PyPI and attaches the frontend-bundled artifacts to a
# GitHub Release whenever a version tag (e.g. v1.0.0) is pushed.
#
# PyPI upload uses Trusted Publishing (OIDC) — no API token is stored. One-time
# setup on PyPI: add a trusted publisher for project "hydralab" pointing at
# repo M1Vj/HydraLab, workflow "release.yml", environment "pypi".

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build frontend-bundled sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Build distributables (web UI bundled)
        run: uv run python scripts/build_release.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  pypi-publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Attach artifacts to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Create or update the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes \
            || gh release upload "$TAG" dist/* --repo "$GITHUB_REPOSITORY" --clobber
