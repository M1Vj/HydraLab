name: Release macOS

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        required: true
        type: choice
        options: ["stable", "preview", "dev"]

jobs:
  license-gate:
    name: License gate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Enforce bundled dependency licenses
        run: python scripts/license_gate.py --evidence release-evidence/license-gate.json
      - name: Upload license evidence
        uses: actions/upload-artifact@v4
        with:
          name: license-gate
          path: release-evidence/license-gate.json

  packaged-build-template:
    name: Packaged build template
    needs: license-gate
    runs-on: macos-latest
    if: ${{ false }}
    steps:
      - uses: actions/checkout@v4
      - name: Build web assets
        run: cd apps/web && bun install --frozen-lockfile && bun run build
      # Disabled template until Apple credentials and the native toolchain are available.
      # Signing uses APPLE_DEVELOPER_ID. Notarization uses APPLE_NOTARIZATION_PASSWORD.
      # The release job must run packaging/signing/notarization after the license gate:
      #   cd apps/desktop && bun run build
      #   codesign --force --deep --options runtime --sign "$APPLE_DEVELOPER_ID" ...
      #   xcrun notarytool submit ... --password "$APPLE_NOTARIZATION_PASSWORD" --wait
      #   python scripts/package-macos.py <artifact-manifest-or-dir>
